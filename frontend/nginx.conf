server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback: any unknown path returns index.html so react-router can
  # take over client-side.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache hashed asset bundles aggressively; never cache the entry HTML.
  location ~* \.(?:js|css|woff2?|ttf|svg|png|jpe?g|gif|ico)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }
}
