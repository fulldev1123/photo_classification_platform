services:
  auth-db:
    image: postgres:16-alpine
    container_name: auth-db
    environment:
      POSTGRES_USER: ${AUTH_DB_USER:-auth}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD:-auth}
      POSTGRES_DB: ${AUTH_DB_NAME:-auth_db}
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_DB_USER:-auth} -d ${AUTH_DB_NAME:-auth_db}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [backend]

  submission-db:
    image: postgres:16-alpine
    container_name: submission-db
    environment:
      POSTGRES_USER: ${SUBMISSION_DB_USER:-submission}
      POSTGRES_PASSWORD: ${SUBMISSION_DB_PASSWORD:-submission}
      POSTGRES_DB: ${SUBMISSION_DB_NAME:-submission_db}
    volumes:
      - submission_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SUBMISSION_DB_USER:-submission} -d ${SUBMISSION_DB_NAME:-submission_db}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [backend]

  minio:
    image: minio/minio:RELEASE.2024-09-13T20-26-02Z
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks: [backend]

  auth-service:
    build:
      context: ./services/auth-service
    container_name: auth-service
    environment:
      DATABASE_URL: postgresql+psycopg2://${AUTH_DB_USER:-auth}:${AUTH_DB_PASSWORD:-auth}@auth-db:5432/${AUTH_DB_NAME:-auth_db}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRES_MINUTES: ${ACCESS_TOKEN_EXPIRES_MINUTES:-60}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin12345}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    depends_on:
      auth-db:
        condition: service_healthy
    ports:
      - "8001:8000"
    networks: [backend]

  submission-service:
    build:
      context: ./services/submission-service
    container_name: submission-service
    environment:
      DATABASE_URL: postgresql+psycopg2://${SUBMISSION_DB_USER:-submission}:${SUBMISSION_DB_PASSWORD:-submission}@submission-db:5432/${SUBMISSION_DB_NAME:-submission_db}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      S3_ENDPOINT_URL: http://minio:9000
      S3_PUBLIC_ENDPOINT_URL: ${S3_PUBLIC_ENDPOINT_URL:-http://localhost:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-photos}
      S3_FORCE_PATH_STYLE: "true"
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-5242880}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    depends_on:
      submission-db:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8002:8000"
    networks: [backend]

  frontend:
    build:
      context: ./frontend
      args:
        VITE_AUTH_API: ${VITE_AUTH_API:-http://localhost:8001}
        VITE_SUBMISSION_API: ${VITE_SUBMISSION_API:-http://localhost:8002}
    container_name: frontend
    depends_on:
      - auth-service
      - submission-service
    ports:
      - "5173:80"
    networks: [backend]

volumes:
  auth_db_data:
  submission_db_data:
  minio_data:

networks:
  backend:
    driver: bridge
