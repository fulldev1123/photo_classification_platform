name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  lint-test:
    name: Lint & Test (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [auth-service, submission-service]
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/${{ matrix.service }}/requirements.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest

      - name: Lint
        run: ruff check app tests

      - name: Tests
        env:
          DATABASE_URL: sqlite:///./test.db
          JWT_SECRET: test-secret-test-secret-test-secret
        run: pytest

  frontend:
    name: Frontend (typecheck + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build

  build-and-push:
    name: Build & Push images
    needs: [lint-test, frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: auth-service
            context: services/auth-service
          - name: submission-service
            context: services/submission-service
          - name: frontend
            context: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.name }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  deploy:
    name: Deploy to Kubernetes
    needs: build-and-push
    runs-on: ubuntu-latest
    if: false
    environment: production  # gate via GitHub environment + reviewers
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubeconfig
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG }}
        run: |
          if [ -z "$KUBECONFIG_B64" ]; then
            echo "KUBECONFIG secret not set – skipping deploy."
            echo "SKIP_DEPLOY=true" >> "$GITHUB_ENV"
            exit 0
          fi
          mkdir -p ~/.kube
          printf '%s' "$KUBECONFIG_B64" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Set image tags & apply manifests
        if: env.SKIP_DEPLOY != 'true'
        env:
          IMAGE_TAG: sha-${{ github.sha }}
          IMAGE_OWNER: ${{ env.IMAGE_OWNER }}
        run: |
          # Replace :latest with the current immutable sha tag and substitute
          # the literal OWNER placeholder with the actual GHCR namespace.
          for f in k8s/*.yaml; do
            sed -i "s|:latest|:${IMAGE_TAG}|g; s|ghcr.io/OWNER/|ghcr.io/${IMAGE_OWNER}/|g" "$f"
          done
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/ -n photo-platform
          kubectl rollout status deploy/auth-service -n photo-platform --timeout=180s
          kubectl rollout status deploy/submission-service -n photo-platform --timeout=180s
          kubectl rollout status deploy/frontend -n photo-platform --timeout=180s
