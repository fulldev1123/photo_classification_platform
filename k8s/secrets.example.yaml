# EXAMPLE ONLY. Do NOT commit real secrets.
# In production, manage secrets via Sealed Secrets, External Secrets Operator,
# AWS/GCP Secret Manager, or HashiCorp Vault.
apiVersion: v1
kind: Secret
metadata:
  name: platform-secrets
  namespace: photo-platform
type: Opaque
stringData:
  JWT_SECRET: "replace-with-32+char-random-string"
  AUTH_DB_PASSWORD: "replace-me"
  SUBMISSION_DB_PASSWORD: "replace-me"
  ADMIN_PASSWORD: "replace-me"
  S3_ACCESS_KEY: "minioadmin"
  S3_SECRET_KEY: "minioadmin"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-config
  namespace: photo-platform
data:
  JWT_ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRES_MINUTES: "60"
  S3_BUCKET: "photos"
  S3_FORCE_PATH_STYLE: "true"
  MAX_UPLOAD_BYTES: "5242880"
  CORS_ORIGINS: "https://app.example.com"
  ADMIN_EMAIL: "admin@example.com"
