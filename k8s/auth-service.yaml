apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: photo-platform
spec:
  selector: { app: auth-service }
  ports: [{ port: 80, targetPort: 8000 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: photo-platform
spec:
  replicas: 2
  selector: { matchLabels: { app: auth-service } }
  template:
    metadata: { labels: { app: auth-service } }
    spec:
      # Allow in-flight requests to finish; preStop drains before SIGTERM.
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: app
          image: ghcr.io/OWNER/auth-service:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8000 }]
          env:
            - name: AUTH_DB_PASSWORD
              valueFrom: { secretKeyRef: { name: platform-secrets, key: AUTH_DB_PASSWORD } }
            - name: DATABASE_URL
              value: postgresql+psycopg2://auth:$(AUTH_DB_PASSWORD)@auth-db:5432/auth_db
            - name: JWT_SECRET
              valueFrom: { secretKeyRef: { name: platform-secrets, key: JWT_SECRET } }
            - name: ADMIN_PASSWORD
              valueFrom: { secretKeyRef: { name: platform-secrets, key: ADMIN_PASSWORD } }
          envFrom:
            - configMapRef: { name: platform-config }
          lifecycle:
            preStop:
              # Let Service endpoints converge before the server stops accepting.
              exec: { command: ["sh", "-c", "sleep 5"] }
          readinessProbe:
            # DB-aware: a pod with an unreachable database leaves the rotation.
            httpGet: { path: /health/ready, port: 8000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            # Shallow: stays green on a slow DB so the pod is not kill-looped.
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests: { cpu: "50m",  memory: "128Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: auth-service
  namespace: photo-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: auth-service
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: auth-service
  namespace: photo-platform
spec:
  minAvailable: 1
  selector: { matchLabels: { app: auth-service } }
