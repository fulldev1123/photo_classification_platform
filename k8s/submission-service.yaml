apiVersion: v1
kind: Service
metadata:
  name: submission-service
  namespace: photo-platform
spec:
  selector: { app: submission-service }
  ports: [{ port: 80, targetPort: 8000 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: submission-service
  namespace: photo-platform
spec:
  replicas: 2
  selector: { matchLabels: { app: submission-service } }
  template:
    metadata: { labels: { app: submission-service } }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: app
          image: ghcr.io/OWNER/submission-service:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8000 }]
          env:
            - name: SUBMISSION_DB_PASSWORD
              valueFrom: { secretKeyRef: { name: platform-secrets, key: SUBMISSION_DB_PASSWORD } }
            - name: DATABASE_URL
              value: postgresql+psycopg2://submission:$(SUBMISSION_DB_PASSWORD)@submission-db:5432/submission_db
            - name: JWT_SECRET
              valueFrom: { secretKeyRef: { name: platform-secrets, key: JWT_SECRET } }
            - name: S3_ACCESS_KEY
              valueFrom: { secretKeyRef: { name: platform-secrets, key: S3_ACCESS_KEY } }
            - name: S3_SECRET_KEY
              valueFrom: { secretKeyRef: { name: platform-secrets, key: S3_SECRET_KEY } }
            - { name: S3_ENDPOINT_URL, value: "http://minio:9000" }
          envFrom:
            - configMapRef: { name: platform-config }
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "1000m", memory: "1Gi" }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: submission-service
  namespace: photo-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: submission-service
  minReplicas: 2
  maxReplicas: 12
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: submission-service
  namespace: photo-platform
spec:
  minAvailable: 1
  selector: { matchLabels: { app: submission-service } }
