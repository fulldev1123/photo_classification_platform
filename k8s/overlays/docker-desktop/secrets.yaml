# Local-development secrets + config for Docker Desktop. NOT for production.
apiVersion: v1
kind: Secret
metadata:
  name: platform-secrets
  namespace: photo-platform
type: Opaque
stringData:
  JWT_SECRET: "local-dev-jwt-secret-please-change-32chars"
  AUTH_DB_PASSWORD: "auth"
  SUBMISSION_DB_PASSWORD: "submission"
  ADMIN_PASSWORD: "admin12345"
  S3_ACCESS_KEY: "minioadmin"
  S3_SECRET_KEY: "minioadmin"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-config
  namespace: photo-platform
data:
  JWT_ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRES_MINUTES: "60"
  S3_BUCKET: "photos"
  S3_FORCE_PATH_STYLE: "true"
  S3_PUBLIC_ENDPOINT_URL: "http://localhost:9000"
  MAX_UPLOAD_BYTES: "5242880"
  CORS_ORIGINS: "*"
  ADMIN_EMAIL: "admin@example.com"
